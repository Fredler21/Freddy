name: Sync Freddy Knowledge Library

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  sync-knowledge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install downloader dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm PyMuPDF pdfminer.six

      - name: Build knowledge text library
        run: |
          python download_freddy_knowledge.py

      - name: Commit and push generated knowledge updates
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add knowledge/ README.md download_freddy_knowledge.py
            git commit -m "chore: sync extracted cybersecurity knowledge text"
            git push
          else
            echo "No knowledge updates to commit."
          fi